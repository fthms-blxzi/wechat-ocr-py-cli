name: Build CLI (MinGW)

on:
  workflow_dispatch:

env:
  WECHAT_OCR_CMAKE_GENERATOR: "MinGW Makefiles"
  WECHAT_OCR_CPP_REPO_URL: ""
  WECHAT_OCR_CPP_REPO_REF: ""
  WECHAT_VERSION: ""

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MinGW toolchain
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          check-latest: true
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # STANDALONE BUILD
      - name: Run build script (Standalone)
        run: |
          python build.py
        env:
          WECHAT_OCR_NON_STANDALONE: "0"

      - name: Test Single File Mode (Standalone)
        run: dist\wechat-ocr-py-cli.exe --input "samples\sample-img-1.jpg" --output -
        shell: cmd

      - name: Test Input List Mode (Standalone)
        run: |
          echo samples\sample-img-2.jpg > list.txt
          echo samples\sample-img-3.jpg >> list.txt
          dist\wechat-ocr-py-cli.exe --input-list list.txt --output results.jsonl
          type results.jsonl
        shell: cmd

      - name: Extract build version and archive name (Standalone)
        run: python extract_release_meta.py
        env:
          WECHAT_OCR_NON_STANDALONE: "0"

      - name: Compress standalone executable into 7z
        run: |
          cd dist
          7z a -p"${{ env.VERSION }}" -mhe=on "${{ env.ARCHIVE_NAME }}" wechat-ocr-py-cli.exe
        shell: pwsh

      - name: Upload Standalone Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: "The 7z archive password for extraction is the version tag: ${{ env.VERSION }}"
          files: dist/${{ env.ARCHIVE_NAME }}
          draft: false
          prerelease: false

      # NON-STANDALONE BUILD
      - name: Run build script (Non-Standalone)
        run: |
          python build.py
        env:
          WECHAT_OCR_NON_STANDALONE: "1"
          WECHAT_OCR_REUSE_CPP_CORE: "1"

      - name: Test Single File Mode (Non-Standalone)
        run: dist\wechat-ocr-py-cli-ns.exe --wechat-dir "bin\wechat" --wechat-ocr-dir "bin\wechat\ocr" --input "samples\sample-img-1.jpg" --output -
        shell: cmd

      - name: Test Input List Mode (Non-Standalone)
        run: |
          echo samples\sample-img-2.jpg > list.txt
          echo samples\sample-img-3.jpg >> list.txt
          dist\wechat-ocr-py-cli-ns.exe --wechat-dir "bin\wechat" --wechat-ocr-dir "bin\wechat\ocr" --input-list list.txt --output results.jsonl
          type results.jsonl
        shell: cmd

      - name: Extract build version and archive name (Non-Standalone)
        run: python extract_release_meta.py
        env:
          WECHAT_OCR_NON_STANDALONE: "1"

      - name: Compress non-standalone executable into 7z
        run: |
          cd dist
          7z a -p"${{ env.VERSION }}" -mhe=on "${{ env.ARCHIVE_NAME }}" wechat-ocr-py-cli-ns.exe
        shell: pwsh

      - name: Upload Non-Standalone Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: "The 7z archive password for extraction is the version tag: ${{ env.VERSION }}"
          files: dist/${{ env.ARCHIVE_NAME }}
          draft: false
          prerelease: false

